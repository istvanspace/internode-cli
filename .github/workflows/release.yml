name: Release CLI Binaries

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-14
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        working-directory: cli
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          BIN_NAME="internode"
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            BIN_NAME="internode.exe"
          fi
          ARCHIVE_NAME="internode-${{ github.ref_name }}-${{ matrix.target }}.tar.gz"
          mkdir -p dist
          cp "cli/target/${{ matrix.target }}/release/${BIN_NAME}" dist/
          cd dist
          tar czf "../${ARCHIVE_NAME}" "${BIN_NAME}"

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $ARCHIVE_NAME = "internode-${{ github.ref_name }}-${{ matrix.target }}.zip"
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item "cli/target/${{ matrix.target }}/release/internode.exe" -Destination dist/
          Compress-Archive -Path dist/internode.exe -DestinationPath $ARCHIVE_NAME

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: internode-${{ matrix.target }}
          path: internode-*.${{ matrix.archive }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: internode-*
          generate_release_notes: true
